<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spin & Reward</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  padding:20px;
  font-family: Arial, sans-serif;
  background:#121212;
  color:#fff;
  text-align:center;
}

#wheelContainer {
  position:relative;
  width:300px;
  height:300px;
  margin:20px auto;
}

canvas {
  border-radius:50%;
  background:#222;
}

#pointer {
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%) rotate(180deg);
  width:0;
  height:0;
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:20px solid red;
  z-index: 10;
}

#spinBtn {
  margin-top:20px;
  padding:16px 45px;
  font-size:18px;
  font-weight:bold;
  background:#f1c40f;
  color:#000;
  border:none;
  border-radius:40px;
}

#spinBtn:disabled {
  background:#555;
  color:#aaa;
}

#withdrawBtn {
  display:block;
  margin:14px auto 0 auto;
  padding:12px 36px;
  font-size:16px;
  font-weight:bold;
  background:#22c55e;
  color:#ffffff;
  border:none;
  border-radius:40px;
  cursor:not-allowed;
}

#withdrawBtn.enabled {
  cursor:pointer;
}

.small {
  font-size:12px;
  color:#aaa;
  margin-top:6px;
}
</style>

<!-- FIREBASE (INVARIATO) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
  import { getAnalytics,logEvent } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-analytics.js";
  import { getDatabase, ref, set, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyCdXbufEBn45FH-JJpRrWmbSpdY_n-DZf4",
    authDomain: "spinrewardapp-56e7f.firebaseapp.com",
    projectId: "spinrewardapp-56e7f",
    storageBucket: "spinrewardapp-56e7f.firebasestorage.app",
    messagingSenderId: "373874094522",
    appId: "1:373874094522:web:4d2b83a58d1cde08c02d83",
    measurementId: "G-Z604SL4NPK"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getDatabase(app);
  // ---------------- TEMPO SERVER ----------------
async function getServerTime() {
  const tempRef = ref(db, 'tempTime');       // percorso temporaneo in Firebase
  await set(tempRef, serverTimestamp());     // scrive il timestamp server
  const snapshot = await get(tempRef);       // legge il timestamp server
  return snapshot.val();                     // ritorna il tempo in millisecondi
}
  window.logEvent = logEvent;
  window.analytics = analytics;
</script>

</head>

<body>

<h2>🎯 Spin & Reward</h2>

<div><strong>Points:</strong> <span id="points">0</span></div>

<div class="small">
<strong>15,000 Points – Reward</strong><br>
<strong>Gift Card - PayPal</strong>
</div>

<div id="wheelContainer">
  <div id="pointer"></div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

<button id="spinBtn">SPIN</button>
<button id="withdrawBtn" disabled>WITHDRAW</button>

<div class="small">
Rewards are promotional and subject to availability.<br>
No cash value. Not guaranteed.
</div>

<script>
// ---------------- CONFIG ----------------
const COOLDOWN = 30 * 1000; // 30 secondi all'inizio
const SPIN_LIMIT = 100;      // numero massimo spin
const BLOCK_AFTER_LIMIT = 12 * 60 * 60 * 1000; // 12 ore dopo 100 spin
const FIXED_REWARD = 10;
const WITHDRAW_POINTS = 15000;
const WITHDRAW_FORM = "https://forms.gle/kKz8kSW8aoH7Dm7K7";

const sectors = [
  { label: "120 PT", color: "#27ae60" },
  { label: "100 PT", color: "#2ecc71" },
  { label: "50 PT",  color: "#f1c40f" },
  { label: "25 PT",  color: "#f39c12" },
  { label: "15 PT",  color: "#e67e22" },
  { label: "15 PT",  color: "#d35400" },
  { label: "10 PT",  color: "#c0392b" },
  { label: "0 PT",   color: "#7f8c8d" }
];

// ---------------- STORAGE ----------------
let points = Number(localStorage.getItem("points")) || 0;
let spinCount = Number(localStorage.getItem("spinCount")) || 0;  
let cooldownUntil = Number(localStorage.getItem("cooldownUntil")) || 0;
let isFirstLaunch = !localStorage.getItem("hasLaunched");

async function initializeCooldown() {
  const serverTime = await getServerTime();

  // All'apertura dell'app, SPIN disattivato 30s
  cooldownUntil = serverTime + COOLDOWN; // 30 secondi dal momento dell'apertura
  startSpinCountdown(); // ✅ parte il countdown sul pulsante

  // Leggi punti e spinCount salvati
  points = Number(localStorage.getItem("points")) || 0;
  spinCount = Number(localStorage.getItem("spinCount")) || 0;

  // Aggiorna UI
  pointsEl.textContent = points;
  updateWithdraw();
}
  function startSpinCountdown() {
  const interval = setInterval(async () => {
    const serverTime = await getServerTime();
    if (serverTime >= cooldownUntil) {
      spinBtn.disabled = false;
      spinBtn.textContent = "SPIN";
      clearInterval(interval);
    } else {
      const diff = cooldownUntil - serverTime;
      const seconds = Math.ceil(diff / 1000);
      spinBtn.textContent = `Wait ${seconds}s`;
      spinBtn.disabled = true;
    }
  }, 1000);
  }

// Avvio iniziale
initializeCooldown();
 
// ---------------- UI ----------------
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const withdrawBtn = document.getElementById("withdrawBtn");
const pointsEl = document.getElementById("points");

pointsEl.textContent = points;

// ---------------- DRAW WHEEL ----------------
function drawWheel() {
  const r = canvas.width / 2;
  const arc = (2 * Math.PI) / sectors.length;

  sectors.forEach((s, i) => {
    const angle = i * arc;
    ctx.beginPath();
    ctx.moveTo(r, r);
    ctx.arc(r, r, r, angle, angle + arc);
    ctx.fillStyle = s.color;
    ctx.fill();

    ctx.save();
    ctx.translate(r, r);
    ctx.rotate(angle + arc / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#fff";
    ctx.font = "bold 14px Arial";
    ctx.fillText(s.label, r - 10, 5);
    ctx.restore();
  });
}
drawWheel();

// ---------------- COUNTDOWN ----------------
function updateSpinButton() {
  const now = Date.now();

  if (now < cooldownUntil) {
    const diff = cooldownUntil - now;

    if (diff <= 60000) {
      // sotto 1 minuto → mostra secondi
      const seconds = Math.ceil(diff / 1000);
      spinBtn.textContent = `Wait ${seconds}s`;
    } else {
      // sopra 1 minuto → mostra ore/minuti
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      spinBtn.textContent = `Next spin in ${h}h ${m}m`;
    }

    spinBtn.disabled = true;
  } else {
    spinBtn.disabled = false;
    spinBtn.textContent = "SPIN";
  }
}
// ---------------- WITHDRAW ----------------
function updateWithdraw() {
  if (points >= WITHDRAW_POINTS) {
    withdrawBtn.disabled = false;
    withdrawBtn.classList.add("enabled");
  }
}
withdrawBtn.onclick = () => {
  logEvent(analytics, 'withdraw_click'); // 🔥 AGGIUNTO
  if (!withdrawBtn.disabled) {
    window.open(WITHDRAW_FORM, "_blank");
  }
};

// ---------------- BANNER ----------------
function showBanner() {
  if (window.WTN && WTN.AdMob && WTN.AdMob.bannerAd) {
    WTN.AdMob.bannerAd({
      adId: "ca-app-pub-9251543522779819/9330839613", // IL TUO ID BANNER QUI
      position: "bottom",
      autoShow: true
    });
  } else {
    setTimeout(showBanner, 500);
  }
}
window.addEventListener("load", showBanner);

// ---------------- REWARD AD ALL'AVVIO ----------------
function showRewardAd() {
  logEvent(analytics, 'reward_shown'); // 🔥 AGGIUNTO
  if (window.WTN && WTN.AdMob && WTN.AdMob.rewardsAd) {
    WTN.AdMob.rewardsAd({
      adId: "ca-app-pub-9251543522779819/1658358029", // IL TUO ID REWARD AD QUI
      rewardsAdCallback: onAdCompleted
    });
  } else {
    setTimeout(showRewardAd, 500);
  }
}
  // ---------------- INTERSTITIAL ----------------
function showInterstitialAd() {
  logEvent(analytics, 'interstitial_shown'); // 🔥 AGGIUNTO
  if (window.WTN && WTN.AdMob && WTN.AdMob.interstitialAd) {
    WTN.AdMob.interstitialAd({
      adId: "ca-app-pub-9251543522779819/1397635977", // inserisci qui il tuo ID interstitial
      autoShow: true,
      onAdClosed: function() {
        console.log("Interstitial chiuso");
      }
    });
  } else {
    setTimeout(showInterstitialAd, 500);
  }
}
  // ---------------- INTERSTITIAL TIMER AFFIDABILE ----------------
window.addEventListener("load", () => {
  setInterval(() => {
    if (window.WTN && WTN.AdMob && !WTN.AdMob.isAdShowing) {
      showInterstitialAd();
    }
  }, 60000);
});
window.addEventListener("load", showRewardAd);

// ---------------- SPIN FLOW ----------------
spinBtn.onclick = async () => {
  logEvent(analytics, 'spin_click');
  spinBtn.disabled = true;
  await startSpin(); // serve perché startSpin() ora è async
};

window.onAdCompleted = function () {
  // qui se vuoi gestire ricompense extra, ma al momento solo gira ruota
  startSpin();
};

async function startSpin() {
  const index = sectors.findIndex(s => s.label === "10 PT");
  const arc = 360 / sectors.length;

  canvas.style.transition = "none";
  canvas.style.transform = "rotate(0deg)";

  setTimeout(async () => {
    const rotation = 720 + (270 - index * arc - arc / 2);
    canvas.style.transition = "transform 4s cubic-bezier(.17,.67,.12,.99)";
    canvas.style.transform = `rotate(${rotation}deg)`;

    // Dopo che la ruota termina (4s)
    setTimeout(async () => {
      logEvent(analytics, 'spin_complete');
      points += FIXED_REWARD;
      localStorage.setItem("points", points);

      // Aggiorna contatore spin
      spinCount++;
      localStorage.setItem("spinCount", spinCount);

      // Prendi tempo server
      const serverTime = await getServerTime();

      if (spinCount >= SPIN_LIMIT) {
    cooldownUntil = serverTime + BLOCK_AFTER_LIMIT; // blocco 12 ore
    localStorage.setItem("cooldownUntil", cooldownUntil);
    spinCount = 0; // reset contatore per il prossimo ciclo
    localStorage.setItem("spinCount", spinCount);

    // 🟢 PROGRAMMA NOTIFICA DOPO 12 ORE
    if (window.WTN && WTN.Notifications) {
        WTN.Notifications.schedule({
            id: "spinReady",  // ID univoco
            title: "Spin Ready!",
            text: "Le 12 ore sono passate. Torna a girare la ruota!",
            at: cooldownUntil,  // momento in cui si riattiva il pulsante
            sound: "default"    // oppure il nome di un suono personalizzato incluso nell'app
        });
    }
} else {
    cooldownUntil = serverTime + COOLDOWN; // 30 secondi tra spin
    localStorage.setItem("cooldownUntil", cooldownUntil);
      }

      pointsEl.textContent = points;
      updateWithdraw();
      updateSpinButton();

      // Mostra interstitial dopo lo spin
      showInterstitialAd();

    }, 4000); // 4 secondi per animazione ruota
  }, 50);
}

updateWithdraw();
updateSpinButton();
setInterval(updateSpinButton, 1000);
</script>

</body>
</html>
