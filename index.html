<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spin & Reward</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  padding:20px;
  font-family: Arial, sans-serif;
  background:#121212;
  color:#fff;
  text-align:center;
}

#wheelContainer {
  position:relative;
  width:300px;
  height:300px;
  margin:20px auto;
}

canvas {
  border-radius:50%;
  background:#222;
}

#pointer {
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%) rotate(180deg);
  border-left:12px solid transparent;
  border-right:12px solid transparent;
  border-bottom:20px solid red;
}

#spinBtn, #rewardBtn, #withdrawBtn {
  margin-top:10px;
  padding:14px;
  font-size:16px;
  font-weight:bold;
  border:none;
  border-radius:40px;
  width: 85%;
  cursor: pointer;
}

#spinBtn { background:#f1c40f; color:#000; margin-top: 20px; }
#rewardBtn { background:#3498db; color:#fff; }
#withdrawBtn { background:#22c55e; color:#fff; margin-top: 15px; }

#spinBtn:disabled, #rewardBtn:disabled {
  background:#555;
  color:#aaa;
}

.small {
  font-size:12px;
  color:#aaa;
  margin-top:6px;
}
</style>
</head>

<body>

<h2>🎯 Spin & Reward</h2>

<div><strong>Points:</strong> <span id="points">0</span></div>

<div class="small">20,000 Points – PayPal Gift Card</div>

<div id="wheelContainer">
  <div id="pointer"></div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

<button id="spinBtn">SPIN</button>
<button id="rewardBtn">EARN 50 PTS (VIDEO)</button>
<button id="withdrawBtn">WITHDRAW</button>

<div class="small">
Rewards are promotional and subject to availability.
</div>

<script>

// ---------------- CONFIG ----------------
const WITHDRAW_POINTS = 20000;
const FIXED_REWARD = 10;

const BANNER_ID = "ca-app-pub-9251543522779819/9330839613";
const INTERSTITIAL_ID = "ca-app-pub-9251543522779819/1397635977";
const REWARD_ID = "ca-app-pub-9251543522779819/1658358029";

// ---------------- STORAGE ----------------
let points = Number(localStorage.getItem("points")) || 0;
let adCounter = Number(localStorage.getItem("adCounter")) || 0;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const rewardBtn = document.getElementById("rewardBtn");
const pointsEl = document.getElementById("points");

pointsEl.textContent = points;

// ---------------- WHEEL ----------------
const sectors = [
  { label: "120 PT", color: "#27ae60" }, { label: "100 PT", color: "#2ecc71" },
  { label: "50 PT",  color: "#f1c40f" }, { label: "25 PT",  color: "#f39c12" },
  { label: "15 PT",  color: "#e67e22" }, { label: "15 PT",  color: "#d35400" },
  { label: "10 PT",  color: "#c0392b" }, { label: "0 PT",   color: "#7f8c8d" }
];

function drawWheel() {
  const r = canvas.width / 2;
  const arc = (2 * Math.PI) / sectors.length;
  sectors.forEach((s, i) => {
    const angle = i * arc;
    ctx.beginPath(); ctx.moveTo(r, r);
    ctx.arc(r, r, r, angle, angle + arc);
    ctx.fillStyle = s.color; ctx.fill();
    ctx.save(); ctx.translate(r, r); ctx.rotate(angle + arc / 2);
    ctx.textAlign = "right"; ctx.fillStyle = "#fff";
    ctx.font = "bold 14px Arial"; ctx.fillText(s.label, r - 10, 5);
    ctx.restore();
  });
}
drawWheel();

// ---------------- LOGICA REWARD AGGIORNATA (NO ERRORE) ----------------
let isSearchingAd = false;

function tryShowRewardAd() {
  // Se il sistema non è pronto, invece di dare l'alert, scrive sul pulsante e riprova
  if (!(window.WTN && WTN.AdMob)) {
    rewardBtn.disabled = true;
    rewardBtn.textContent = "Connecting to AdMob...";
    setTimeout(tryShowRewardAd, 1500); 
    return;
  }

  isSearchingAd = true;
  rewardBtn.disabled = true;
  rewardBtn.textContent = "Searching Ad...";

  const attempt = () => {
    if (!isSearchingAd) return;

    WTN.AdMob.showRewardAd({
      adId: REWARD_ID,
      successCallback: () => {
        isSearchingAd = false;
        points += 50; 
        localStorage.setItem("points", points);
        pointsEl.textContent = points;
        rewardBtn.disabled = false;
        rewardBtn.textContent = "EARN 50 PTS (VIDEO)";
        alert("Success! 50 points added.");
      },
      failCallback: () => {
        // Riprova ciclicamente finché AdMob non ha un video pronto
        if(isSearchingAd) {
            console.log("Ad not ready yet, retrying...");
            setTimeout(attempt, 2000); 
        }
      }
    });
  };

  attempt();
}

rewardBtn.onclick = tryShowRewardAd;

// Pre-caricamento
window.onload = () => {
  if (window.WTN && WTN.AdMob && WTN.AdMob.loadRewardAd) {
     WTN.AdMob.loadRewardAd({ adId: REWARD_ID });
  }
};

// ---------------- INTERSTITIAL ----------------
function showInterstitial() {
  if (window.WTN && WTN.AdMob) {
    WTN.AdMob.fullScreenAd({
      adId: INTERSTITIAL_ID,
      fullScreenAdCallback: (v) => console.log("Interstitial:", v)
    });
  }
}

// ---------------- SPIN ----------------
spinBtn.onclick = () => {
  spinBtn.disabled = true;
  startSpin();
};

function startSpin() {
  const index = sectors.findIndex(s => s.label === "10 PT");
  const arc = 360 / sectors.length;
  canvas.style.transition = "none";
  canvas.style.transform = "rotate(0deg)";
  setTimeout(() => {
    const rotation = 720 + (270 - index * arc - arc / 2);
    canvas.style.transition = "transform 4s cubic-bezier(.17,.67,.12,.99)";
    canvas.style.transform = `rotate(${rotation}deg)`;
  }, 50);

  setTimeout(() => {
    points += FIXED_REWARD;
    localStorage.setItem("points", points);
    pointsEl.textContent = points;
    adCounter++;
    localStorage.setItem("adCounter", adCounter);

    if (adCounter >= 3) {
      showInterstitial();
      adCounter = 0;
      localStorage.setItem("adCounter", adCounter);
    }

    let timeLeft = 300;
    const interval = setInterval(() => {
      timeLeft--;
      let m = Math.floor(timeLeft / 60);
      let s = timeLeft % 60;
      spinBtn.textContent = `Wait ${m}:${s < 10 ? '0' : ''}${s}`;
      if (timeLeft <= 0) {
        clearInterval(interval);
        spinBtn.disabled = false;
        spinBtn.textContent = "SPIN";
      }
    }, 1000);
  }, 4000);
}

// ---------------- WITHDRAW ----------------
document.getElementById("withdrawBtn").onclick = () => {
  if (points >= WITHDRAW_POINTS) { alert("Request sent!"); } 
  else { alert("You need 20,000 points."); }
};

</script>

</body>
</html>
