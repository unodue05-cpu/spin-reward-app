<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://unpkg.com/webtonative@1.0.96/webtonative.min.js"></script>

<meta charset="UTF-8">
<title>Spin & Reward</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; padding:20px; font-family: Arial, sans-serif; background:#121212; color:#fff; text-align:center; }

/* Contenitore principale della ruota */
#wheelContainer { 
  position:relative; 
  width:300px; 
  height:300px; 
  margin:20px auto; 
}

/* La Ruota (Canvas) */
canvas { 
  border-radius:50%; 
  background:#222; 
  position: relative; /* Aggiunto per gestire lo z-index */
  z-index: 1;         /* Livello base per la ruota */
}

/* CORREZIONE: La Freccetta Rossa (Pointer) */
#pointer { 
  position:absolute; 
  top:-15px;          /* Leggermente più su per non toccare il bordo */
  left:50%; 
  transform:translateX(-50%) rotate(180deg); 
  border-left:15px solid transparent;  /* Leggermente più larga */
  border-right:15px solid transparent; /* Leggermente più larga */
  border-bottom:25px solid red;        /* Leggermente più lunga */
  
  /* --- SOLUZIONE QUI --- */
  z-index: 10;        /* Numero alto per forzarla DAVANTI alla ruota */
  /* --------------------- */
}

/* Pulsanti e testo */
#spinBtn, #rewardBtn, #withdrawBtn { margin-top:10px; padding:14px; font-size:16px; font-weight:bold; border:none; border-radius:40px; width: 85%; cursor: pointer; }
#spinBtn { background:#f1c40f; color:#000; margin-top: 20px; }
#rewardBtn { background:#3498db; color:#fff; }
#withdrawBtn { background:#22c55e; color:#fff; margin-top: 15px; }
#spinBtn:disabled, #rewardBtn:disabled { background:#555; color:#aaa; }
.small { font-size:12px; color:#aaa; margin-top:6px; }
</style>
</head>

<body>

<h2>🎯 Spin & Reward</h2>
<div><strong>Points:</strong> <span id="points">0</span></div>
<div class="small">20,000 Points – PayPal Gift Card</div>

<div id="wheelContainer">
  <div id="pointer"></div> <canvas id="wheel" width="300" height="300"></canvas>
</div>

<button id="spinBtn">SPIN</button>
<button id="rewardBtn">EARN 50 PTS (VIDEO)</button>
<button id="withdrawBtn">WITHDRAW</button>

<script>
// ---------------- CONFIG (Inalterata) ----------------
const WITHDRAW_POINTS = 20000;
const FIXED_REWARD = 10;
const INTERSTITIAL_ID = "ca-app-pub-9251543522779819/1397635977";
const REWARD_ID = "ca-app-pub-9251543522779819/1658358029";

let points = Number(localStorage.getItem("points")) || 0;
let adCounter = Number(localStorage.getItem("adCounter")) || 0;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const rewardBtn = document.getElementById("rewardBtn");
const pointsEl = document.getElementById("points");

pointsEl.textContent = points;

// ---------------- WHEEL (Inalterata) ----------------
const sectors = [
  { label: "120 PT", color: "#27ae60" }, { label: "100 PT", color: "#2ecc71" },
  { label: "50 PT",  color: "#f1c40f" }, { label: "25 PT",  color: "#f39c12" },
  { label: "15 PT",  color: "#e67e22" }, { label: "15 PT",  color: "#d35400" },
  { label: "10 PT",  color: "#c0392b" }, { label: "0 PT",   color: "#7f8c8d" }
];

function drawWheel() {
  const r = canvas.width / 2;
  const arc = (2 * Math.PI) / sectors.length;
  sectors.forEach((s, i) => {
    const angle = i * arc;
    ctx.beginPath(); ctx.moveTo(r, r);
    ctx.arc(r, r, r, angle, angle + arc);
    ctx.fillStyle = s.color; ctx.fill();
    ctx.save(); ctx.translate(r, r); ctx.rotate(angle + arc / 2);
    ctx.textAlign = "right"; ctx.fillStyle = "#fff";
    ctx.font = "bold 14px Arial"; ctx.fillText(s.label, r - 10, 5);
    ctx.restore();
  });
}
drawWheel();

// ---------------- LOGICA REWARD PULITA (Mantenuta) ----------------
function tryShowRewardAd() {
    // Prova a trovare il bridge in entrambi i modi possibili
    const wtnBridge = window.WTN || window.webtonative; 

    if (wtnBridge && wtnBridge.AdMob) {
        rewardBtn.disabled = true;
        rewardBtn.textContent = "Caricamento...";

        wtnBridge.AdMob.showRewardAd({
            adId: REWARD_ID, // Usa la variabile REWARD_ID che hai già definito sopra
            success: function(data) {
                points += 50; 
                localStorage.setItem("points", points);
                pointsEl.textContent = points;
                rewardBtn.disabled = false;
                rewardBtn.textContent = "EARN 50 PTS (VIDEO)";
                alert("Punti aggiunti con successo!");
            },
            fail: function(data) {
                rewardBtn.disabled = false;
                rewardBtn.textContent = "EARN 50 PTS (VIDEO)";
                alert("Ad non disponibile o errore nel caricamento.");
            }
        });
    } else {
        // Se vedi questo alert, lo script di WebToNative ancora non funziona nell'APK
        alert("Errore: Il sistema pubblicitario non è pronto.");
    }
}


rewardBtn.onclick = tryShowRewardAd;

// ---------------- INTERSTITIAL (Mantenuta) ----------------
function showInterstitial() {
  if (window.WTN && window.WTN.adMob) {
    window.WTN.adMob.fullScreenAd({
      adId: INTERSTITIAL_ID,
      fullScreenAdCallback: (v) => console.log("Interstitial:", v)
    });
  }
}

// ---------------- SPIN (Mantenuta) ----------------
spinBtn.onclick = () => {
  spinBtn.disabled = true;
  startSpin();
};

function startSpin() {
  const index = sectors.findIndex(s => s.label === "10 PT");
  const arc = 360 / sectors.length;
  canvas.style.transition = "none";
  canvas.style.transform = "rotate(0deg)";
  setTimeout(() => {
    const rotation = 720 + (270 - index * arc - arc / 2);
    canvas.style.transition = "transform 4s cubic-bezier(.17,.67,.12,.99)";
    canvas.style.transform = `rotate(${rotation}deg)`;
  }, 50);

  setTimeout(() => {
    points += FIXED_REWARD;
    localStorage.setItem("points", points);
    pointsEl.textContent = points;
    adCounter++;
    localStorage.setItem("adCounter", adCounter);

    if (adCounter >= 3) {
      showInterstitial();
      adCounter = 0;
      localStorage.setItem("adCounter", adCounter);
    }

    let timeLeft = 300;
    const interval = setInterval(() => {
      timeLeft--;
      let m = Math.floor(timeLeft / 60);
      let s = timeLeft % 60;
      spinBtn.textContent = `Wait ${m}:${s < 10 ? '0' : ''}${s}`;
      if (timeLeft <= 0) {
        clearInterval(interval);
        spinBtn.disabled = false;
        spinBtn.textContent = "SPIN";
      }
    }, 1000);
  }, 4000);
}

document.getElementById("withdrawBtn").onclick = () => {
  if (points >= WITHDRAW_POINTS) { alert("Request sent!"); } 
  else { alert("You need 20,000 points."); }
};

</script>
</body>
</html>
